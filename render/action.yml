name: 'Render Quarto project'
author: 'step-security'
description: 'This action will render an existing quarto project'
inputs:
  to:
    description: 'Format to render output. Use "all" to generate all outputs, when eg rendering a book in HTML and PDF'
    required: false
  path:
    description: 'Subdirectory containing the quarto project to be rendered'
    required: false
    default: "."
runs:
  using: 'composite'
  steps: 
    - name: Subscription check
      env:
        REPO_PRIVATE: ${{ github.event.repository.private }}
      run: |
        UPSTREAM="quarto-dev/quarto-actions"
        ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"
        DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"

        echo ""
        echo -e "\033[1;36mStepSecurity Maintained Action\033[0m"
        echo "Secure drop-in replacement for $UPSTREAM"
        if [ "$REPO_PRIVATE" = "false" ]; then
          echo -e "\033[32m✓ Free for public repositories\033[0m"
        fi
        echo -e "\033[36mLearn more:\033[0m $DOCS_URL"
        echo ""

        if [ "$REPO_PRIVATE" != "false" ]; then
          SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

          if [ "$SERVER_URL" != "https://github.com" ]; then
            BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
          else
            BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
          fi

          API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

          RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Timeout or API not reachable. Continuing to next step."
          elif [ "$RESPONSE" = "403" ]; then
            echo -e "::error::\033[1;31mThis action requires a StepSecurity subscription for private repositories.\033[0m"
            echo -e "::error::\033[31mLearn how to enable a subscription: $DOCS_URL\033[0m"
            exit 1
          fi
        fi
      shell: bash

    # Chrome v128 started to create problem. Pin previous version in the meantime
    # - name: Install Chrome
    # uses: browser-actions/setup-chrome@v1
    #  with:
    #    chrome-version: 127
    # The Check Chromium step appears necessary to avoid a crash/hang when rendering PDFs
    #
    # chromium is installed in the ubuntu 21 runners in GHA, so no need to install it
    #- name: 'Check Chromium'
    #  if: ${{ runner.os == 'Linux' }}
    #  run: |
    #    echo $(which google-chrome)
    #    $(which google-chrome) --headless --no-sandbox --disable-gpu --renderer-process-limit=1 https://www.chromestatus.com
    #  shell: bash
    - name: 'Render'
      env:
        QUARTO_PRINT_STACK: true
      run: |
        if [ "${{ inputs.to }}" == "" ]; then
          quarto render ${{ inputs.path }}
        else
          quarto render ${{ inputs.path }} --to ${{ inputs.to }}
        fi
        if [ -f "_book" ]; then
          echo "QUARTO_OUTPUT=_book" >> $GITHUB_ENV
        elif [ -f "_site" ]; then
          echo "QUARTO_OUTPUT=_site" >> $GITHUB_ENV
        fi
      shell: bash
